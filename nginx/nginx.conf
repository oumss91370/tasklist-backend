# Nginx en reverse-proxy devant l'API TaskList (terminaison HTTP, en-têtes, point d'entrée unique).
events {}

http {
  upstream tasklist_api {
    server api:3000;
  }

  server {
    listen 80;
    server_name _;

    # Sonde de santé
    location = /health {
      proxy_pass http://tasklist_api/health;
    }

    # API
    location /api/ {
      proxy_pass http://tasklist_api;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
