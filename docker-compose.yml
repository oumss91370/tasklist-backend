# Stack complète : MySQL + API TaskList + Nginx (reverse proxy).
# Lancer :  docker compose up -d   puis ouvrir  http://localhost/api/tasks

services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: tasklist
      MYSQL_USER: tasklist
      MYSQL_PASSWORD: tasklist
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  api:
    image: ${IMAGE:-tasklist-backend:local}
    build: .
    environment:
      DATABASE_URL: "mysql://tasklist:tasklist@db:3306/tasklist"
      PORT: "3000"
    # Applique le schéma à MySQL puis démarre l'API
    command: sh -c "npx prisma db push --schema=prisma/schema.prisma --skip-generate && node dist/server.js"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  db_data:
